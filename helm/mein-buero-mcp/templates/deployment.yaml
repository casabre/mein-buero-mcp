apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "mein-buero-mcp.fullname" . }}
  labels: {{- include "mein-buero-mcp.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels: {{- include "mein-buero-mcp.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
      labels: {{- include "mein-buero-mcp.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "mein-buero-mcp.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets: {{- toYaml . | nindent 8 }}
      {{- end }}
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
      - name: mcp
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        ports:
        - name: http
          containerPort: 3000
        env:
        {{- range $k, $v := .Values.env }}
        - name: {{ $k }}
          value: {{ $v | quote }}
        {{- end }}
        - name: MEINBUERO_OWNERSHIP_ID
          valueFrom:
            secretKeyRef:
              name: {{ include "mein-buero-mcp.fullname" . }}
              key: MEINBUERO_OWNERSHIP_ID
        - name: MEINBUERO_MCP_API_KEY
          valueFrom:
            secretKeyRef:
              name: {{ include "mein-buero-mcp.fullname" . }}
              key: MEINBUERO_MCP_API_KEY
              optional: true
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 15
          periodSeconds: 15
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 2
        resources: {{- toYaml .Values.resources | nindent 10 }}
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop: [ALL]
        volumeMounts:
        - name: tmp
          mountPath: /tmp
      volumes:
      - name: tmp
        emptyDir: {}
