apiVersion: v1
kind: Secret
metadata:
  name: {{ include "mein-buero-mcp.fullname" . }}
  labels: {{- include "mein-buero-mcp.labels" . | nindent 4 }}
type: Opaque
data:
  MEINBUERO_OWNERSHIP_ID: {{ required "secrets.ownershipId is required — pass --set secrets.ownershipId=xxx" .Values.secrets.ownershipId | b64enc | quote }}
  MEINBUERO_MCP_API_KEY:  {{ .Values.secrets.mcpApiKey | b64enc | quote }}
