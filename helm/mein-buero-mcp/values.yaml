replicaCount: 2

image:
  # Replace YOUR_GITHUB_USERNAME with your GitHub username or org
  repository: ghcr.io/YOUR_GITHUB_USERNAME/mein-buero-mcp
  tag: latest
  pullPolicy: Always

# imagePullSecrets: needed for private GHCR images
# Create with: kubectl create secret docker-registry ghcr-secret \
#   --docker-server=ghcr.io --docker-username=<user> --docker-password=<PAT>
imagePullSecrets: []
# - name: ghcr-secret

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: false
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
  hosts:
    - host: mcp.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: mcp-tls
      hosts: [mcp.example.com]

resources:
  limits:
    cpu: 500m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70

serviceAccount:
  create: false
  name: ""

env:
  NODE_ENV: production
  TRANSPORT: http
  PORT: "3000"

# Pass at deploy time: --set secrets.ownershipId=xxx
# Never commit real values here
secrets:
  ownershipId: ""
  mcpApiKey: ""
